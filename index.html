<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現在地</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --paper: #f7f3ea;
  --ink: #2a2723;
  --ink-soft: #6b6358;
  --rule: #d9cdb3;
  --rule-soft: #e7dec8;
  --accent: #8a5a2b;
  --sat: #3a5a7a;
  --sun: #a84040;
  --shadow: rgba(40, 30, 15, 0.18);
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  background: #d9cdb3 repeating-linear-gradient(
    135deg,
    rgba(0,0,0,0.015) 0 2px,
    transparent 2px 6px
  );
  color: var(--ink);
  font-family: "Yu Gothic", "YuGothic", "游ゴシック", "游ゴシック体", "Hiragino Sans", "ヒラギノ角ゴ ProN", sans-serif;
}
.site-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 1.2rem 2rem 0.6rem;
  gap: 1rem;
  flex-wrap: wrap;
  max-width: 1600px;
  margin: 0 auto;
}
.site-title {
  font-size: 1.6rem;
  letter-spacing: 0.4em;
  margin: 0;
  font-weight: 500;
}
.controls { display: flex; align-items: center; gap: 0.5rem; font-size: 0.95rem; }
.controls button {
  background: var(--paper);
  border: 1px solid var(--rule);
  color: var(--ink);
  padding: 0.3rem 0.75rem;
  font-family: inherit;
  cursor: pointer;
  border-radius: 2px;
}
.controls button:hover { background: #fff9eb; }
.controls .today-btn { margin-left: 0.5rem; }
#week-label {
  min-width: 11rem;
  text-align: center;
  color: var(--ink-soft);
  letter-spacing: 0.1em;
}
.sheet {
  max-width: 1600px;
  margin: 1rem auto 3rem;
  padding: 1.5rem 1.25rem;
  background: var(--paper);
  background-image:
    radial-gradient(circle at 0 0, rgba(0,0,0,0.04), transparent 60%),
    radial-gradient(circle at 100% 100%, rgba(0,0,0,0.04), transparent 60%);
  border-radius: 4px;
  filter: drop-shadow(0 12px 24px var(--shadow));
}
.day-grid {
  display: grid;
  grid-template-columns: 3.2rem repeat(7, 1fr);
  border-top: 1px solid var(--rule);
  border-left: 1px solid var(--rule);
}
.grid-head, .grid-cell, .grid-time {
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  padding: 0.35rem 0.4rem;
  min-height: 2.4rem;
  font-size: 0.85rem;
  line-height: 1.35;
}
.grid-head {
  text-align: center;
  font-weight: 500;
  letter-spacing: 0.15em;
  background: var(--rule-soft);
  padding: 0.5rem 0.3rem;
}
.grid-head .date {
  display: block;
  font-size: 0.75rem;
  color: var(--ink-soft);
  letter-spacing: 0.1em;
  margin-top: 2px;
}
.grid-head.is-today { background: #f1d9b5; color: var(--accent); }
.grid-head.is-sat { color: var(--sat); }
.grid-head.is-sun { color: var(--sun); }
.grid-time {
  text-align: right;
  font-variant-numeric: tabular-nums;
  color: var(--ink-soft);
  background: var(--rule-soft);
  font-size: 0.78rem;
  padding-right: 0.5rem;
  position: sticky;
  left: 0;
  z-index: 2;
}
.day-grid > .grid-head:first-child {
  position: sticky;
  left: 0;
  z-index: 3;
}
.grid-cell { background: transparent; position: relative; transition: background 0.3s; }
.grid-cell.is-past { background: rgba(0,0,0,0.06); }
.grid-cell.is-past textarea { color: var(--ink-soft); }
.grid-cell.is-now {
  background: rgba(220, 60, 60, 0.12);
  box-shadow: inset 0 0 0 2px #c83c3c;
}
.grid-cell.is-now textarea { color: #8a2222; font-weight: 500; }
.clock {
  font-variant-numeric: tabular-nums;
  font-size: 1.1rem;
  letter-spacing: 0.15em;
  color: var(--ink);
  margin-right: 1rem;
}
.clock .date { color: var(--ink-soft); font-size: 0.85rem; margin-right: 0.5rem; }
.gcal-btn.connected { background: #e3efd9; border-color: #8aa878; }
.gcal-status { font-size: 0.78rem; color: var(--ink-soft); margin-left: 0.25rem; }
.event-chip {
  display: block;
  font-size: 0.72rem;
  line-height: 1.25;
  background: #cfe0f5;
  color: #214775;
  border-left: 2px solid #4a78b8;
  padding: 1px 4px;
  margin-bottom: 2px;
  border-radius: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: default;
}
.event-chip .t { color: #4a78b8; margin-right: 3px; font-variant-numeric: tabular-nums; }
.grid-cell.is-now .event-chip { background: #f5d3cf; color: #751f1f; border-left-color: #b8594a; }
.grid-cell.is-now .event-chip .t { color: #b8594a; }
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
.modal {
  background: var(--paper); padding: 1.5rem; border-radius: 4px;
  max-width: 480px; width: 90%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.modal h2 { margin: 0 0 0.75rem; font-size: 1.1rem; letter-spacing: 0.1em; }
.modal p { margin: 0.5rem 0; font-size: 0.85rem; line-height: 1.5; color: var(--ink-soft); }
.modal input {
  width: 100%; padding: 0.5rem; margin: 0.5rem 0;
  border: 1px solid var(--rule); background: #fff;
  font-family: inherit; font-size: 0.85rem;
  border-radius: 2px;
}
.modal-actions { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1rem; }
.grid-cell textarea {
  width: 100%;
  height: 100%;
  min-height: 2rem;
  border: none;
  background: transparent;
  resize: none;
  font-family: inherit;
  font-size: 0.85rem;
  color: var(--ink);
  outline: none;
  padding: 0;
  overflow: hidden;
  line-height: 1.35;
}
.grid-cell:focus-within {
  background: rgba(255, 240, 200, 0.45);
  box-shadow: inset 0 0 0 1px var(--accent);
}
.task-chip {
  display: block;
  font-size: 0.72rem;
  line-height: 1.25;
  background: #ffe4d1;
  color: #7a3a10;
  border-left: 2px solid #ff7a45;
  padding: 1px 4px;
  margin-bottom: 2px;
  border-radius: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  position: relative;
}
.task-chip .t { color: #ff7a45; margin-right: 3px; font-variant-numeric: tabular-nums; font-weight: 600; }
.task-chip .done-chk { margin-right: 3px; vertical-align: middle; }
.task-chip.done { opacity: 0.45; text-decoration: line-through; }
.grid-cell.is-now .task-chip { background: #fbd5c6; border-left-color: #c83c3c; }

.todo-cell {
  display: flex;
  align-items: flex-start;
  gap: 4px;
  background: rgba(255, 250, 232, 0.55);
}
.todo-cell .todo-cb {
  margin: 2px 0 0 0;
  flex-shrink: 0;
  cursor: pointer;
  accent-color: var(--accent);
}
.todo-cell textarea { flex: 1; }
.todo-cell.is-done textarea {
  text-decoration: line-through;
  color: var(--ink-soft);
}

.checklist-cell {
  padding: 0.35rem;
  background: rgba(255, 250, 232, 0.55);
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}
.checklist-items {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-height: 0;
}
.checklist-item {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.78rem;
  padding: 2px 4px;
  border-radius: 3px;
  background: rgba(255,255,255,0.6);
  line-height: 1.3;
}
.checklist-item.done .cl-text { text-decoration: line-through; color: var(--ink-soft); }
.checklist-item input[type="checkbox"] { margin: 0; cursor: pointer; flex-shrink: 0; }
.checklist-item .cl-text { flex: 1; word-break: break-word; }
.checklist-item .cl-del {
  background: transparent; border: none; color: var(--ink-soft);
  cursor: pointer; padding: 0 4px; font-size: 0.9rem; line-height: 1;
  font-family: inherit;
  opacity: 0;
  transition: opacity 0.15s;
}
.checklist-item:hover .cl-del { opacity: 1; }
.checklist-item .cl-del:hover { color: #c83c3c; }
.checklist-add { margin-top: 0.3rem; }
.checklist-add input {
  width: 100%;
  padding: 4px 6px;
  border: 1px solid var(--rule);
  border-radius: 3px;
  font-family: inherit;
  font-size: 0.78rem;
  background: #fff;
  outline: none;
}
.checklist-add input:focus { border-color: var(--accent); }

.year-section {
  max-width: 1600px;
  margin: 2rem auto 5rem;
  padding: 1.5rem 1.25rem;
  background: var(--paper);
  border-radius: 4px;
  filter: drop-shadow(0 12px 24px var(--shadow));
}
.year-title {
  font-size: 1.1rem;
  letter-spacing: 0.3em;
  margin: 0 0 1rem;
  text-align: center;
  color: var(--ink);
}
.year-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1.25rem;
}
.month {
  font-size: 0.8rem;
}
.month-title {
  font-weight: 500;
  letter-spacing: 0.2em;
  margin: 0 0 0.4rem;
  color: var(--ink);
  text-align: center;
  font-size: 0.85rem;
}
.month-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}
.month-head {
  font-size: 0.65rem;
  color: var(--ink-soft);
  text-align: center;
  padding: 2px 0;
  letter-spacing: 0.05em;
}
.month-head.is-sat { color: var(--sat); }
.month-head.is-sun { color: var(--sun); }
.month-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  border-radius: 50%;
  cursor: pointer;
  background: transparent;
  border: none;
  color: var(--ink);
  padding: 0;
  font-family: inherit;
  font-variant-numeric: tabular-nums;
}
.month-day:hover { background: rgba(0,0,0,0.06); }
.month-day.is-other { color: #c9bea5; cursor: default; }
.month-day.is-other:hover { background: transparent; }
.month-day.is-sat { color: var(--sat); }
.month-day.is-sun { color: var(--sun); }
.month-day.is-other.is-sat,
.month-day.is-other.is-sun { color: #d9c3b8; }
.month-day.is-today {
  background: var(--accent);
  color: #fff;
  font-weight: 600;
}
.month-day.is-selected-week {
  background: rgba(255, 200, 130, 0.5);
  border-radius: 3px;
}
.month-day.is-today.is-selected-week { background: var(--accent); border-radius: 50%; }

@media (max-width: 900px) {
  .year-section { margin: 1rem 0.25rem 5rem; padding: 1rem 0.5rem; }
  .year-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
  .month-day { font-size: 0.65rem; }
  .month-head { font-size: 0.6rem; }
}

.fab {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: #ff7a45;
  color: #fff;
  border: none;
  font-size: 32px;
  font-weight: 300;
  line-height: 1;
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(255, 122, 69, 0.4);
  z-index: 50;
  font-family: inherit;
}
.fab:hover { transform: translateX(-50%) translateY(-2px); }

.task-modal label { display: block; font-size: 0.75rem; color: var(--ink-soft); margin: 0.5rem 0 0.2rem; }
.task-modal input[type="text"], .task-modal input[type="date"] {
  width: 100%; padding: 0.5rem; margin: 0;
  border: 1px solid var(--rule); background: #fff;
  font-family: inherit; font-size: 0.9rem; border-radius: 3px;
}
.duration-buttons { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.25rem; }
.duration-btn {
  flex: 1; min-width: 60px; height: 44px;
  border-radius: 8px; border: none;
  font-size: 0.85rem; font-weight: 600; cursor: pointer;
  font-family: inherit; color: #fff;
  transition: transform 0.1s;
}
.duration-btn[data-min="5"]  { background: #ff6b9d; }
.duration-btn[data-min="15"] { background: #feca57; }
.duration-btn[data-min="30"] { background: #1dd1a1; }
.duration-btn[data-min="60"] { background: #5f8cff; }
.duration-btn.selected { transform: scale(1.08); box-shadow: 0 0 0 2px #fff, 0 0 0 4px currentColor; }
.priority-squares { display: flex; gap: 4px; margin-top: 0.25rem; }
.priority-square {
  flex: 1; aspect-ratio: 1; max-width: 32px;
  border: none; border-radius: 5px; cursor: pointer;
  background: #eee; padding: 0;
}
.priority-val { font-weight: 600; color: #ff7a45; margin-left: 0.4rem; }
.task-modal .submit-btn {
  background: #ff7a45; color: #fff; border: none;
  padding: 0.6rem 1.2rem; border-radius: 6px;
  font-size: 0.9rem; font-weight: 600; cursor: pointer;
  font-family: inherit;
}

:root { --time-col-width: 3.2rem; --todo-col-fr: 1.5fr; }

@media (max-width: 900px) {
  :root { --time-col-width: 2.5rem; --todo-col-fr: 3fr; }
  html, body { overflow-x: hidden; }
  #grid-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .day-grid { min-width: 780px; }
  .sheet { padding: 0.5rem 0.25rem; }
  .site-header { padding: 0.75rem 0.75rem 0.4rem; }
  .controls { flex-wrap: wrap; row-gap: 0.3rem; font-size: 0.85rem; }
  .controls button { padding: 0.25rem 0.5rem; font-size: 0.8rem; }
  #week-label { min-width: 0; font-size: 0.8rem; letter-spacing: 0.05em; }
  .clock { font-size: 0.9rem; margin-right: 0.25rem; letter-spacing: 0.05em; }
  .clock .date { font-size: 0.72rem; margin-right: 0.25rem; }
  .site-title { font-size: 1.2rem; letter-spacing: 0.25em; }
  .grid-head, .grid-cell, .grid-time {
    padding: 0.2rem 0.15rem;
    font-size: 0.7rem;
    min-height: 2rem;
  }
  .grid-head { padding: 0.3rem 0.1rem; letter-spacing: 0.05em; }
  .grid-head .date { font-size: 0.6rem; letter-spacing: 0; margin-top: 1px; }
  .grid-time { font-size: 0.62rem; padding-right: 0.2rem; }
  .grid-cell textarea { font-size: 0.7rem; }
  .event-chip, .task-chip { font-size: 0.6rem; padding: 1px 2px; }
  .task-chip .done-chk { width: 10px; height: 10px; }
}
</style>
</head>
<body>
  <header class="site-header">
    <h1 class="site-title">現在地</h1>
    <div class="controls">
      <span class="clock" id="clock" aria-live="polite"></span>
      <button id="prev-week" aria-label="前の週">‹</button>
      <span id="week-label"></span>
      <button id="next-week" aria-label="次の週">›</button>
      <button id="today" class="today-btn">今週</button>
      <button id="gcal-btn" class="gcal-btn">Google連携</button>
      <span id="gcal-status" class="gcal-status"></span>
    </div>
  </header>

  <main class="sheet">
    <div id="grid-container"></div>
  </main>

  <section class="year-section">
    <h2 class="year-title" id="year-title">2026</h2>
    <div class="year-grid" id="year-grid"></div>
  </section>

  <button class="fab" id="task-fab" aria-label="タスクを追加">+</button>

<script>
const DAYS = ["月", "火", "水", "木", "金", "土", "日"];
const START_HOUR = 8;
const END_HOUR = 23;
const STORAGE_PREFIX = "genzaichi:";

const container = document.getElementById("grid-container");
const weekLabel = document.getElementById("week-label");

let currentMonday = mondayOf(new Date());

function mondayOf(d) {
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const day = x.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  x.setDate(x.getDate() + diff);
  return x;
}
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
function pad(n) { return String(n).padStart(2, "0"); }
function weekKey(monday) { return `${monday.getFullYear()}-${pad(monday.getMonth()+1)}-${pad(monday.getDate())}`; }
function isSameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function formatDate(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
function formatWeekLabel(monday) {
  const sunday = addDays(monday, 6);
  return `${monday.getFullYear()}年 ${formatDate(monday)} — ${formatDate(sunday)}`;
}
function cellKey(monday, dayIndex, hour) {
  return `${STORAGE_PREFIX}${weekKey(monday)}:${dayIndex}:${hour}`;
}
function autosize(ta) {
  ta.style.height = "auto";
  ta.style.height = Math.max(ta.scrollHeight, 24) + "px";
}

function buildGrid(monday) {
  container.innerHTML = "";
  const grid = document.createElement("div");
  grid.className = "day-grid";

  const today = new Date();
  const mondayMid = new Date(monday); mondayMid.setHours(0,0,0,0);
  const todayMid = new Date(today); todayMid.setHours(0,0,0,0);
  const todayIndex = Math.round((todayMid - mondayMid) / 86400000);
  const cols = Array.from({length: 7}, (_, i) => i === todayIndex ? "2fr" : "1fr").join(" ");
  grid.style.gridTemplateColumns = `var(--time-col-width) ${cols} var(--todo-col-fr)`;

  const corner = document.createElement("div");
  corner.className = "grid-head";
  grid.appendChild(corner);

  for (let i = 0; i < 7; i++) {
    const date = addDays(monday, i);
    const head = document.createElement("div");
    head.className = "grid-head";
    if (isSameDay(date, today)) head.classList.add("is-today");
    if (i === 5) head.classList.add("is-sat");
    if (i === 6) head.classList.add("is-sun");
    head.innerHTML = `${DAYS[i]}<span class="date">${formatDate(date)}</span>`;
    grid.appendChild(head);
  }

  const clHead = document.createElement("div");
  clHead.className = "grid-head";
  clHead.textContent = "ToDo";
  grid.appendChild(clHead);

  for (let h = START_HOUR; h <= END_HOUR; h++) {
    const t = document.createElement("div");
    t.className = "grid-time";
    t.textContent = `${pad(h)}:00`;
    grid.appendChild(t);

    for (let i = 0; i < 7; i++) {
      const cell = document.createElement("div");
      cell.className = "grid-cell";
      cell.dataset.day = i;
      cell.dataset.hour = h;
      const ta = document.createElement("textarea");
      ta.rows = 1;
      const key = cellKey(monday, i, h);
      ta.value = localStorage.getItem(key) || "";
      requestAnimationFrame(() => autosize(ta));
      ta.addEventListener("input", () => {
        localStorage.setItem(key, ta.value);
        autosize(ta);
      });
      cell.appendChild(ta);
      grid.appendChild(cell);
    }

    const todoCell = document.createElement("div");
    todoCell.className = "grid-cell todo-cell";
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.className = "todo-cb";
    const todoTa = document.createElement("textarea");
    todoTa.rows = 1;
    const tKey = `${STORAGE_PREFIX}${weekKey(monday)}:todo:${h}`;
    let tData = { text: "", done: false };
    try { tData = JSON.parse(localStorage.getItem(tKey)) || tData; } catch {}
    cb.checked = tData.done;
    todoTa.value = tData.text;
    if (tData.done) todoCell.classList.add("is-done");
    requestAnimationFrame(() => autosize(todoTa));
    const syncTodo = () => {
      localStorage.setItem(tKey, JSON.stringify({ text: todoTa.value, done: cb.checked }));
      todoCell.classList.toggle("is-done", cb.checked);
    };
    cb.addEventListener("change", syncTodo);
    todoTa.addEventListener("input", () => { syncTodo(); autosize(todoTa); });
    todoCell.appendChild(cb);
    todoCell.appendChild(todoTa);
    grid.appendChild(todoCell);
  }
  container.appendChild(grid);
  updateCellStates();
}

function buildChecklistUI(host, monday) {
  const key = `${STORAGE_PREFIX}checklist:${weekKey(monday)}`;
  let items = [];
  try { items = JSON.parse(localStorage.getItem(key)) || []; } catch {}

  const list = document.createElement("div");
  list.className = "checklist-items";

  const save = () => localStorage.setItem(key, JSON.stringify(items));

  const rerender = () => {
    list.innerHTML = "";
    items.forEach((item, idx) => {
      const row = document.createElement("div");
      row.className = "checklist-item" + (item.done ? " done" : "");
      row.innerHTML = `<input type="checkbox" ${item.done ? "checked" : ""}><span class="cl-text"></span><button type="button" class="cl-del" aria-label="削除">×</button>`;
      row.querySelector(".cl-text").textContent = item.text;
      row.querySelector("input").addEventListener("change", (e) => {
        items[idx].done = e.target.checked;
        save();
        rerender();
      });
      row.querySelector(".cl-del").addEventListener("click", () => {
        items.splice(idx, 1);
        save();
        rerender();
      });
      list.appendChild(row);
    });
  };

  const form = document.createElement("form");
  form.className = "checklist-add";
  form.innerHTML = `<input type="text" placeholder="＋ 追加...">`;
  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const input = form.querySelector("input");
    const text = input.value.trim();
    if (!text) return;
    items.push({ text, done: false });
    save();
    input.value = "";
    rerender();
  });

  host.appendChild(list);
  host.appendChild(form);
  rerender();
}

function updateCellStates() {
  const now = new Date();
  const cells = container.querySelectorAll(".grid-cell");
  cells.forEach((cell) => {
    const i = Number(cell.dataset.day);
    const h = Number(cell.dataset.hour);
    const cellStart = addDays(currentMonday, i);
    cellStart.setHours(h, 0, 0, 0);
    const cellEnd = new Date(cellStart.getTime() + 60 * 60 * 1000);
    cell.classList.remove("is-past", "is-now");
    if (now >= cellEnd) cell.classList.add("is-past");
    else if (now >= cellStart) cell.classList.add("is-now");
  });
}

function updateClock() {
  const now = new Date();
  const d = `${now.getMonth()+1}/${now.getDate()}(${DAYS[(now.getDay()+6)%7]})`;
  const t = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  document.getElementById("clock").innerHTML = `<span class="date">${d}</span>${t}`;
}

function render() {
  weekLabel.textContent = formatWeekLabel(currentMonday);
  buildGrid(currentMonday);
}

document.getElementById("prev-week").addEventListener("click", () => { currentMonday = addDays(currentMonday, -7); render(); });
document.getElementById("next-week").addEventListener("click", () => { currentMonday = addDays(currentMonday, 7); render(); });
document.getElementById("today").addEventListener("click", () => { currentMonday = mondayOf(new Date()); render(); });

updateClock();
render();
buildYearCalendar(2026);
setInterval(() => { updateClock(); updateCellStates(); renderTasks(); }, 1000);

// ---------- Year calendar ----------
function buildYearCalendar(year) {
  const yearGrid = document.getElementById("year-grid");
  document.getElementById("year-title").textContent = `${year}`;
  yearGrid.innerHTML = "";
  for (let m = 0; m < 12; m++) {
    yearGrid.appendChild(buildMonth(year, m));
  }
  highlightSelectedWeek();
}

function buildMonth(year, month) {
  const box = document.createElement("div");
  box.className = "month";
  const title = document.createElement("h3");
  title.className = "month-title";
  title.textContent = `${month + 1}月`;
  box.appendChild(title);

  const grid = document.createElement("div");
  grid.className = "month-grid";
  ["月","火","水","木","金","土","日"].forEach((d, i) => {
    const h = document.createElement("div");
    h.className = "month-head";
    if (i === 5) h.classList.add("is-sat");
    if (i === 6) h.classList.add("is-sun");
    h.textContent = d;
    grid.appendChild(h);
  });

  const firstOfMonth = new Date(year, month, 1);
  const firstMonday = mondayOf(firstOfMonth);
  const today = new Date(); today.setHours(0,0,0,0);

  for (let w = 0; w < 6; w++) {
    for (let d = 0; d < 7; d++) {
      const date = addDays(firstMonday, w * 7 + d);
      const btn = document.createElement("button");
      btn.className = "month-day";
      btn.type = "button";
      btn.textContent = date.getDate();
      btn.dataset.iso = `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
      if (date.getMonth() !== month) btn.classList.add("is-other");
      if (d === 5) btn.classList.add("is-sat");
      if (d === 6) btn.classList.add("is-sun");
      if (date.getTime() === today.getTime()) btn.classList.add("is-today");
      btn.addEventListener("click", () => {
        if (btn.classList.contains("is-other")) return;
        currentMonday = mondayOf(date);
        render();
        highlightSelectedWeek();
        document.querySelector(".sheet").scrollIntoView({ behavior: "smooth", block: "start" });
      });
      grid.appendChild(btn);
    }
    if (addDays(firstMonday, w * 7).getMonth() > month && w > 3) break;
  }
  box.appendChild(grid);
  return box;
}

function highlightSelectedWeek() {
  const mondayIso = `${currentMonday.getFullYear()}-${pad(currentMonday.getMonth()+1)}-${pad(currentMonday.getDate())}`;
  const weekDates = new Set();
  for (let i = 0; i < 7; i++) {
    const d = addDays(currentMonday, i);
    weekDates.add(`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`);
  }
  document.querySelectorAll(".month-day").forEach(btn => {
    btn.classList.toggle("is-selected-week", weekDates.has(btn.dataset.iso));
  });
}

const _origRender3 = render;
render = function() { _origRender3(); highlightSelectedWeek(); };

// ---------- Tasks ----------
const TASK_KEY = "genzaichi:tasks";
let tasks = loadTasks();

function loadTasks() {
  try { return JSON.parse(localStorage.getItem(TASK_KEY)) || []; }
  catch { return []; }
}
function saveTasks() { localStorage.setItem(TASK_KEY, JSON.stringify(tasks)); }
function genId() {
  if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
}
function daysUntil(dateStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  const deadline = new Date(dateStr); deadline.setHours(0,0,0,0);
  return Math.round((deadline - today) / 86400000);
}
function calcScore(t) {
  const days = daysUntil(t.deadline);
  const urgency = days <= 0 ? 10 : 10 / (days + 1);
  return (t.priority * urgency) / Math.max(t.duration / 60, 0.1);
}

function renderTasks() {
  container.querySelectorAll(".task-chip").forEach(n => n.remove());
  const todayDate = new Date(); todayDate.setHours(0,0,0,0);
  const mondayMid = new Date(currentMonday); mondayMid.setHours(0,0,0,0);
  const dayIndex = Math.round((todayDate - mondayMid) / 86400000);
  if (dayIndex < 0 || dayIndex > 6) return;

  const sorted = tasks
    .filter(t => !t.done)
    .map(t => ({ ...t, score: calcScore(t) }))
    .sort((a, b) => b.score - a.score);
  if (sorted.length === 0) return;

  const now = new Date();
  let h = Math.max(START_HOUR, now.getHours());
  if (h > END_HOUR) return;
  let capacity = 60;

  for (const task of sorted) {
    while (h <= END_HOUR && task.duration > capacity) { h++; capacity = 60; }
    if (h > END_HOUR) break;
    const cell = container.querySelector(`.grid-cell[data-day="${dayIndex}"][data-hour="${h}"]`);
    if (cell) {
      const ta = cell.querySelector("textarea");
      cell.insertBefore(makeTaskChip(task), ta);
    }
    capacity -= task.duration;
  }
  // Render done tasks greyed in-place (optional: skip since filtered above)
}

function makeTaskChip(task) {
  const chip = document.createElement("div");
  chip.className = "task-chip" + (task.done ? " done" : "");
  chip.dataset.id = task.id;
  chip.innerHTML = `<input type="checkbox" class="done-chk" ${task.done ? "checked" : ""}><span class="t">${task.duration}分</span>${escapeHtml(task.title)}`;
  chip.title = `優先度 ${task.priority}/10 · 期限 ${task.deadline} · スコア ${calcScore(task).toFixed(1)}`;
  return chip;
}

// Wrap render to include tasks
const _origRender2 = render;
render = function() {
  _origRender2();
  renderTasks();
};

container.addEventListener("click", (e) => {
  const chip = e.target.closest(".task-chip");
  if (!chip) return;
  const id = chip.dataset.id;
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  if (e.target.classList.contains("done-chk")) {
    task.done = e.target.checked;
    saveTasks();
    renderTasks();
    return;
  }
  if (confirm(`「${task.title}」を削除しますか?`)) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    renderTasks();
  }
});

// Task modal
const taskFab = document.getElementById("task-fab");
taskFab.addEventListener("click", openTaskModal);

function openTaskModal() {
  const today = new Date();
  const defaultDate = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  backdrop.innerHTML = `
    <div class="modal task-modal">
      <h2>タスクを追加</h2>
      <label>やること</label>
      <input type="text" id="t-title" placeholder="例: 資料をまとめる" />
      <label>所要時間</label>
      <div class="duration-buttons" id="t-duration">
        <button type="button" class="duration-btn" data-min="5">5分</button>
        <button type="button" class="duration-btn" data-min="15">15分</button>
        <button type="button" class="duration-btn" data-min="30">30分</button>
        <button type="button" class="duration-btn" data-min="60">1時間</button>
      </div>
      <label>期限</label>
      <input type="date" id="t-deadline" value="${defaultDate}" />
      <label>優先度 <span class="priority-val" id="t-priority-val">5</span></label>
      <div class="priority-squares" id="t-priority">
        ${Array.from({length: 10}, (_, i) => `<button type="button" class="priority-square" data-level="${i+1}"></button>`).join("")}
      </div>
      <div class="modal-actions">
        <button id="t-cancel">キャンセル</button>
        <button id="t-save" class="submit-btn">追加</button>
      </div>
    </div>`;
  document.body.appendChild(backdrop);

  let selectedDuration = null;
  let selectedPriority = 5;
  const setPriority = (lv) => {
    selectedPriority = lv;
    backdrop.querySelector("#t-priority-val").textContent = lv;
    backdrop.querySelectorAll(".priority-square").forEach(sq => {
      const v = Number(sq.dataset.level);
      sq.style.background = v <= lv ? `hsl(0, 82%, ${72 - (v-1)*3.5}%)` : "#eee";
    });
  };
  setPriority(5);

  backdrop.querySelector("#t-duration").addEventListener("click", (e) => {
    const btn = e.target.closest(".duration-btn");
    if (!btn) return;
    selectedDuration = Number(btn.dataset.min);
    backdrop.querySelectorAll(".duration-btn").forEach(b => b.classList.toggle("selected", b === btn));
  });
  backdrop.querySelector("#t-priority").addEventListener("click", (e) => {
    const sq = e.target.closest(".priority-square");
    if (sq) setPriority(Number(sq.dataset.level));
  });

  const close = () => backdrop.remove();
  backdrop.querySelector("#t-cancel").onclick = close;
  backdrop.addEventListener("click", (e) => { if (e.target === backdrop) close(); });

  backdrop.querySelector("#t-save").onclick = () => {
    const title = backdrop.querySelector("#t-title").value.trim();
    const deadline = backdrop.querySelector("#t-deadline").value;
    if (!title) { backdrop.querySelector("#t-title").focus(); return; }
    if (!selectedDuration) { alert("所要時間を選択してください"); return; }
    if (!deadline) { alert("期限を入力してください"); return; }
    tasks.push({
      id: genId(), title, duration: selectedDuration, deadline,
      priority: selectedPriority, done: false, createdAt: Date.now()
    });
    saveTasks();
    renderTasks();
    close();
  };

  backdrop.querySelector("#t-title").focus();
}

// ---------- Google Calendar integration ----------
const GCAL_CLIENT_ID_KEY = "genzaichi:gcal_client_id";
const GCAL_CONNECTED_KEY = "genzaichi:gcal_connected";
const GCAL_SCOPE = "https://www.googleapis.com/auth/calendar.readonly";
let tokenClient = null;
let accessToken = null;
let tokenExpiry = 0;
let eventsByCell = new Map();

const gcalBtn = document.getElementById("gcal-btn");
const gcalStatus = document.getElementById("gcal-status");

gcalBtn.addEventListener("click", onGcalClick);

function onGcalClick() {
  if (accessToken && Date.now() < tokenExpiry) {
    accessToken = null;
    tokenExpiry = 0;
    eventsByCell.clear();
    localStorage.removeItem(GCAL_CONNECTED_KEY);
    gcalBtn.classList.remove("connected");
    gcalBtn.textContent = "Google連携";
    gcalStatus.textContent = "";
    render();
    return;
  }
  const clientId = localStorage.getItem(GCAL_CLIENT_ID_KEY);
  if (!clientId) { promptClientId(); return; }
  startAuth(clientId, false);
}

function promptClientId() {
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  backdrop.innerHTML = `
    <div class="modal">
      <h2>Google OAuth Client ID</h2>
      <p>Google Cloud Console で作成した OAuth クライアント ID を貼り付けてください。<br>形式: <code>xxxxx.apps.googleusercontent.com</code></p>
      <p>承認済み JavaScript 生成元に <code>${location.origin}</code> を追加しておく必要があります。</p>
      <input type="text" id="client-id-input" placeholder="xxxxx.apps.googleusercontent.com" />
      <div class="modal-actions">
        <button id="client-id-cancel">キャンセル</button>
        <button id="client-id-save">保存して連携</button>
      </div>
    </div>`;
  document.body.appendChild(backdrop);
  const input = backdrop.querySelector("#client-id-input");
  input.focus();
  backdrop.querySelector("#client-id-cancel").onclick = () => backdrop.remove();
  backdrop.querySelector("#client-id-save").onclick = () => {
    const v = input.value.trim();
    if (!v) return;
    localStorage.setItem(GCAL_CLIENT_ID_KEY, v);
    backdrop.remove();
    startAuth(v);
  };
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") backdrop.querySelector("#client-id-save").click();
    if (e.key === "Escape") backdrop.remove();
  });
}

function startAuth(clientId, silent) {
  if (!window.google || !google.accounts || !google.accounts.oauth2) {
    if (!silent) gcalStatus.textContent = "Google SDK 読込中...";
    setTimeout(() => startAuth(clientId, silent), 300);
    return;
  }
  if (!tokenClient || tokenClient.__clientId !== clientId) {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: clientId,
      scope: GCAL_SCOPE,
      callback: (resp) => {
        if (resp.error) {
          if (silent) {
            localStorage.removeItem(GCAL_CONNECTED_KEY);
            gcalStatus.textContent = "";
          } else {
            gcalStatus.textContent = `エラー: ${resp.error}`;
          }
          return;
        }
        accessToken = resp.access_token;
        tokenExpiry = Date.now() + (Number(resp.expires_in) - 60) * 1000;
        localStorage.setItem(GCAL_CONNECTED_KEY, "1");
        gcalBtn.classList.add("connected");
        gcalBtn.textContent = "連携解除";
        gcalStatus.textContent = "";
        fetchAndRenderEvents();
      },
    });
    tokenClient.__clientId = clientId;
  }
  if (!silent) gcalStatus.textContent = "認証中...";
  const wasConnected = localStorage.getItem(GCAL_CONNECTED_KEY) === "1";
  tokenClient.requestAccessToken({ prompt: (accessToken || wasConnected || silent) ? "" : "consent" });
}

(function autoReconnectGcal() {
  const id = localStorage.getItem(GCAL_CLIENT_ID_KEY);
  const was = localStorage.getItem(GCAL_CONNECTED_KEY) === "1";
  if (id && was) startAuth(id, true);
})();

async function fetchAndRenderEvents() {
  if (!accessToken) return;
  const timeMin = new Date(currentMonday);
  timeMin.setHours(0,0,0,0);
  const timeMax = addDays(timeMin, 7);
  const url = new URL("https://www.googleapis.com/calendar/v3/calendars/primary/events");
  url.searchParams.set("timeMin", timeMin.toISOString());
  url.searchParams.set("timeMax", timeMax.toISOString());
  url.searchParams.set("singleEvents", "true");
  url.searchParams.set("orderBy", "startTime");
  url.searchParams.set("maxResults", "250");
  try {
    const r = await fetch(url.toString(), { headers: { Authorization: `Bearer ${accessToken}` } });
    if (!r.ok) {
      gcalStatus.textContent = `取得失敗 (${r.status})`;
      if (r.status === 401) { accessToken = null; tokenExpiry = 0; }
      return;
    }
    const data = await r.json();
    eventsByCell.clear();
    (data.items || []).forEach(mapEventToCell);
    renderEventChips();
    gcalStatus.textContent = `${(data.items || []).length}件`;
  } catch (e) {
    gcalStatus.textContent = `エラー: ${e.message}`;
  }
}

function mapEventToCell(ev) {
  if (!ev.start) return;
  const isAllDay = !ev.start.dateTime;
  const start = new Date(ev.start.dateTime || ev.start.date);
  const end = ev.end ? new Date(ev.end.dateTime || ev.end.date) : new Date(start.getTime() + 3600000);
  const dayIndex = Math.floor((start - currentMonday) / 86400000);
  if (dayIndex < 0 || dayIndex > 6) return;
  const hour = isAllDay ? START_HOUR : Math.max(START_HOUR, Math.min(END_HOUR, start.getHours()));
  const key = `${dayIndex}:${hour}`;
  if (!eventsByCell.has(key)) eventsByCell.set(key, []);
  eventsByCell.get(key).push({ title: ev.summary || "(無題)", start, end, isAllDay });
}

function renderEventChips() {
  container.querySelectorAll(".event-chip").forEach(n => n.remove());
  eventsByCell.forEach((events, key) => {
    const [day, hour] = key.split(":");
    const cell = container.querySelector(`.grid-cell[data-day="${day}"][data-hour="${hour}"]`);
    if (!cell) return;
    events.forEach(ev => {
      const chip = document.createElement("div");
      chip.className = "event-chip";
      const time = ev.isAllDay ? "終日"
        : `${pad(ev.start.getHours())}:${pad(ev.start.getMinutes())}`;
      chip.innerHTML = `<span class="t">${time}</span>${escapeHtml(ev.title)}`;
      chip.title = `${ev.title}\n${ev.start.toLocaleString()} – ${ev.end.toLocaleString()}`;
      cell.insertBefore(chip, cell.firstChild);
    });
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

const _origRender = render;
render = function() { _origRender(); if (accessToken) renderEventChips(); };
document.getElementById("prev-week").addEventListener("click", () => { if (accessToken) fetchAndRenderEvents(); });
document.getElementById("next-week").addEventListener("click", () => { if (accessToken) fetchAndRenderEvents(); });
document.getElementById("today").addEventListener("click", () => { if (accessToken) fetchAndRenderEvents(); });
</script>
